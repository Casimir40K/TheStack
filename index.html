<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>The Stack</title>
  <style>
    /* ── TOKENS ─────────────────────────────────────── */
    :root {
      --bg:           #F4EBE0;
      --surface:      #FDFAF5;
      --surface2:     #EDE3D6;
      --border:       #DDD0BB;
      --text:         #1C1718;
      --muted:        #7A6858;
      --accent:       #B6854D;
      --accent-bg:    rgba(182,133,77,.12);
      --accent-br:    rgba(182,133,77,.38);
      --accent2:      #AA9486;
      --r:            14px;
      --r-sm:         10px;
      --sh:           0 2px 10px rgba(28,23,24,.07);
    }

    /* ── RESET ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      background: var(--bg);
      -webkit-tap-highlight-color: transparent;
      height: 100%;
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.4;
      color: var(--text);
      background: var(--bg);
      min-height: 100dvh;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input, textarea { font-family: inherit; }

    /* ── HEADER ─────────────────────────────────────── */
    .hdr {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(14px, env(safe-area-inset-top, 14px)) 16px 14px;
      background: rgba(244,235,224,.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .hdr-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -.3px;
    }
    .hdr-badge {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 11px;
      letter-spacing: .25px;
    }

    /* ── MAIN LAYOUT ────────────────────────────────── */
    main {
      display: flex;
      flex-direction: column;
      padding-bottom: max(32px, env(safe-area-inset-bottom, 32px));
    }

    /* ── DAY NAV ────────────────────────────────────── */
    .day-nav {
      display: flex;
      align-items: center;
      padding: 16px 8px 0;
    }
    .nav-btn {
      width: 48px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: var(--muted);
      border-radius: var(--r-sm);
      touch-action: manipulation;
      flex-shrink: 0;
      -webkit-user-select: none;
      user-select: none;
      line-height: 1;
    }
    .nav-btn:active { background: var(--surface2); color: var(--accent); }
    .day-info {
      flex: 1;
      text-align: center;
      min-width: 0;
      padding: 0 4px;
    }
    .day-name-big {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -.4px;
      line-height: 1;
    }
    .day-focus-text {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 8px;
    }

    /* ── MODE + TODAY ROW ───────────────────────────── */
    .mode-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px 0;
    }
    .mode-seg {
      display: flex;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      flex: 1;
    }
    .mode-btn {
      flex: 1;
      padding: 9px 4px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      touch-action: manipulation;
      min-height: 42px;
    }
    .mode-btn.active {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 1px 5px rgba(28,23,24,.10);
    }
    .today-btn {
      padding: 9px 18px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-bg);
      border: 1px solid var(--accent-br);
      touch-action: manipulation;
      min-height: 42px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .today-btn:active { opacity: .75; }

    /* ── SUMMARY PILLS ──────────────────────────────── */
    .summary-row {
      display: flex;
      gap: 8px;
      padding: 10px 14px 0;
    }
    .sum-pill {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 12px;
    }
    .sum-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .45px;
      color: var(--muted);
    }
    .sum-val {
      font-size: 13px;
      font-weight: 700;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sum-val.accent { color: var(--accent); }

    /* ── CAROUSEL ───────────────────────────────────── */
    .carousel-wrap {
      padding: 12px 14px 0;
      /* overflow: hidden; keep this off so border-radius shows */
    }
    .carousel {
      display: flex;
      overflow-x: scroll;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      gap: 0;
      scrollbar-width: none;
    }
    .carousel::-webkit-scrollbar { display: none; }

    /* Each card fills the carousel exactly */
    .day-card {
      flex: 0 0 100%;
      scroll-snap-align: start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      /* No box-shadow: it gets clipped by the scroll container */
      overflow: hidden;
      display: flex;
      flex-direction: column;
      /* svh = small viewport height — stable, never changes as address bar shows/hides */
      height: 54svh;
      min-height: 360px;
      max-height: 520px;
    }
    .day-card.is-today {
      border-color: var(--accent);
      /* inset shadow draws inside the element — not clipped by scroll container,
         perfectly follows border-radius, visually reads as a ~3px accent border */
      box-shadow: inset 0 0 0 3px var(--accent);
    }

    /* Card header (not scrollable) */
    .card-hdr {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .card-hdr-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }
    .card-day-label {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -.2px;
    }
    .card-chips {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 55%;
    }
    .chip {
      font-size: 10px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--surface2);
      border-radius: 999px;
      padding: 4px 9px;
      white-space: nowrap;
      color: var(--muted);
    }
    .chip-key  { border-color: var(--accent-br); background: var(--accent-bg); color: var(--accent); }
    .chip-warm { border-color: rgba(170,148,134,.38); background: rgba(170,148,134,.10); color: var(--accent2); }
    .chip-gold { border-color: rgba(182,133,77,.50); background: rgba(182,133,77,.12); color: #6B4E2A; }
    .card-focus-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 7px;
      line-height: 1.35;
    }

    /* Scrollable cells */
    .cells {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
      padding: 8px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .cells::-webkit-scrollbar { width: 3px; }
    .cells::-webkit-scrollbar-thumb { background: rgba(125,107,94,.22); border-radius: 999px; }

    .cell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      padding: 11px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      cursor: pointer;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .cell:active { background: rgba(182,133,77,.08); }
    .cell-left { flex: 1; min-width: 0; }
    .cell-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
    }
    .cell-preview {
      font-size: 13px;
      font-weight: 700;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .cell-arrow {
      font-size: 16px;
      color: var(--border);
      flex-shrink: 0;
      line-height: 1;
    }

    /* ── CAROUSEL DOTS ──────────────────────────────── */
    .carousel-dots {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      padding: 10px 0 4px;
      min-height: 26px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
      transition: width .2s, background .2s, border-radius .2s;
      flex-shrink: 0;
    }
    .dot.active {
      width: 20px;
      background: var(--accent);
      border-radius: 3px;
    }

    /* ── SECTION CARDS (checklist, metrics) ─────────── */
    .s-card {
      margin: 10px 14px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      box-shadow: var(--sh);
    }
    .s-card-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .45px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── CHECKLIST ──────────────────────────────────── */
    .check-list { display: flex; flex-direction: column; gap: 7px; }
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
    }
    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
    }
    .check-text { flex: 1; min-width: 0; }
    .check-title { font-size: 14px; font-weight: 700; }
    .check-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── BUTTONS ────────────────────────────────────── */
    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .btn {
      padding: 11px 16px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 700;
      min-height: 44px;
      touch-action: manipulation;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }
    .btn:active { opacity: .75; }
    .btn-primary {
      border-color: var(--accent-br);
      background: var(--accent-bg);
      color: var(--accent);
    }

    /* ── METRICS ────────────────────────────────────── */
    .metric-group { display: flex; flex-direction: column; gap: 10px; }
    .field-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .45px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input:not([type="checkbox"]), textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      background: var(--surface2);
      color: var(--text);
      font-size: 15px;
      -webkit-appearance: none;
      outline: none;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(182,133,77,.12);
    }
    textarea { min-height: 90px; resize: vertical; }

    /* ── MODAL (bottom sheet) ───────────────────────── */
    .modal-back {
      position: fixed;
      inset: 0;
      background: rgba(28,23,24,.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 80;
    }
    .modal-back.open { display: flex; }
    .modal {
      width: 100%;
      max-width: 600px;
      max-height: 92dvh;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      box-shadow: 0 -8px 40px rgba(28,23,24,.18);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      margin: 10px auto 4px;
      flex-shrink: 0;
    }
    .modal-hdr {
      padding: 8px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }
    .modal-title { font-size: 16px; font-weight: 900; }
    .modal-meta { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.35; }
    .modal-close {
      padding: 8px 14px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 700;
      background: var(--surface2);
      border: 1px solid var(--border);
      min-height: 44px;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-sec {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
    }
    .modal-sec-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .45px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .steps { padding-left: 20px; display: flex; flex-direction: column; gap: 6px; margin: 0; }
    .steps li { font-size: 14px; line-height: 1.45; }
    .modal-ftr {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      background: var(--surface);
      flex-shrink: 0;
    }
  </style>
</head>

<!-- HEADER -->
<header class="hdr">
  <span class="hdr-title">The Stack</span>
  <span class="hdr-badge">v7 · locked</span>
</header>

<main>

  <!-- DAY NAV -->
  <div class="day-nav">
    <button class="nav-btn" id="prevDay" aria-label="Previous day">‹</button>
    <div class="day-info">
      <div class="day-name-big" id="dayName">Monday</div>
      <div class="day-focus-text" id="dayFocus">—</div>
    </div>
    <button class="nav-btn" id="nextDay" aria-label="Next day">›</button>
  </div>

  <!-- MODE + TODAY -->
  <div class="mode-row">
    <div class="mode-seg" role="tablist">
      <button class="mode-btn active" id="modeDay" role="tab">Day</button>
      <button class="mode-btn" id="mode3" role="tab">3-day</button>
      <button class="mode-btn" id="modeWeek" role="tab">Week</button>
    </div>
    <button class="today-btn" id="jumpToday">Today</button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-row">
    <div class="sum-pill">
      <div class="sum-label">Training</div>
      <div class="sum-val" id="sumTrain">—</div>
    </div>
    <div class="sum-pill">
      <div class="sum-label">PM active</div>
      <div class="sum-val accent" id="sumPM">—</div>
    </div>
  </div>

  <!-- CHECKLIST (above carousel for quick access) -->
  <div class="s-card">
    <div class="s-card-title">Today's checklist</div>
    <div class="check-list" id="checks"></div>
    <div class="btn-row">
      <button class="btn" id="resetDayChecks">Reset today</button>
      <button class="btn" id="resetAll">Reset all data</button>
    </div>
  </div>

  <!-- CAROUSEL -->
  <div class="carousel-wrap">
    <div class="carousel" id="carousel"></div>
    <div class="carousel-dots" id="carouselDots"></div>
  </div>

  <!-- WEEKLY METRICS -->
  <div class="s-card">
    <div class="s-card-title">Weekly metrics</div>
    <div class="metric-group">
      <div>
        <div class="field-label">Avg weight</div>
        <input id="wAvg" placeholder="e.g., 86.1 kg" />
      </div>
      <div>
        <div class="field-label">Waist</div>
        <input id="waist" placeholder="e.g., 86 cm" />
      </div>
      <div>
        <div class="field-label">Steps avg</div>
        <input id="steps" placeholder="e.g., 7,800" />
      </div>
      <div>
        <div class="field-label">Weekly notes</div>
        <textarea id="notes" placeholder="Win: …&#10;Friction: …&#10;Adjustment: …"></textarea>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="saveWeekly">Save weekly</button>
      <button class="btn" id="clearWeekly">Clear</button>
    </div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-back" id="modalBack" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div>
        <div class="modal-title" id="modalTitle">—</div>
        <div class="modal-meta" id="modalMeta">—</div>
      </div>
      <button class="modal-close" id="closeModal">Done</button>
    </div>
    <div class="modal-body">
      <div class="modal-sec">
        <div class="modal-sec-title">Steps</div>
        <ol class="steps" id="modalSteps"></ol>
      </div>
      <div class="modal-sec">
        <div class="modal-sec-title">Your notes (saved)</div>
        <textarea id="modalDetails" placeholder="Add specifics — exercises, product notes, timing…"></textarea>
      </div>
    </div>
    <div class="modal-ftr">
      <button class="btn" id="clearDetails">Clear</button>
      <button class="btn btn-primary" id="saveDetails">Save</button>
    </div>
  </div>
</div>

const CHECK_ITEMS = [
  { id:"protein", label:"Protein shake",              sub:"" },
  { id:"study",   label:"Study block (45 min)",       sub:"Define task before starting" },
  { id:"train",   label:"Training done (if scheduled)",sub:"" },
  { id:"oralpm",  label:"PM oral hygiene",            sub:"Brush → floss → tongue → mouthwash" },
  { id:"prayer",  label:"Prayer",                     sub:"3–5 min after PM oral" },
];

/* ── STORAGE ──────────────────────────────────────────────── */
function load() { return JSON.parse(localStorage.getItem(KEY) || "{}"); }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }

/* ── HELPERS ──────────────────────────────────────────────── */
function todayName() {
  return ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][new Date().getDay()];
}
function clamp(i) { return (i + 7) % 7; }
function getSelected() { return load().selectedDay || todayName(); }

/* ── STATE ────────────────────────────────────────────────── */
let mode = 'day';           // 'day' | '3' | 'week'
let carouselDays = [];      // days currently in the carousel

/* ── TOP UI ───────────────────────────────────────────────── */
function updateTop(day) {
  document.getElementById('dayName').textContent   = day;
  document.getElementById('dayFocus').textContent  = master[day].Focus;
  document.getElementById('sumTrain').textContent  = TRAIN_LABEL[day] || '—';
  document.getElementById('sumPM').textContent     = PM_LABEL[day]    || '—';
}

/* ── CHECKLIST ────────────────────────────────────────────── */
function renderChecks(day) {
  const state = (load()[`d_${day}`]) || {};
  const wrap  = document.getElementById('checks');
  wrap.innerHTML = '';
  CHECK_ITEMS.forEach(it => {
    const row = document.createElement('div');
    row.className = 'check-item';
    const cb = document.createElement('input');
    cb.type    = 'checkbox';
    cb.checked = !!state[it.id];
    cb.addEventListener('change', () => {
      const d = load();
      d[`d_${day}`] = d[`d_${day}`] || {};
      d[`d_${day}`][it.id] = cb.checked;
      save(d);
    });
    const txt = document.createElement('div');
    txt.className = 'check-text';
    txt.innerHTML = `<div class="check-title">${it.label}</div>`
                  + (it.sub ? `<div class="check-sub">${it.sub}</div>` : '');
    row.appendChild(cb);
    row.appendChild(txt);
    wrap.appendChild(row);
  });
}

/* ── CAROUSEL ─────────────────────────────────────────────── */
function calcCarouselDays(m, sel) {
  const idx = DAY_ORDER.indexOf(sel);
  if (m === 'day')  return [sel];
  if (m === '3')    return [DAY_ORDER[clamp(idx-1)], sel, DAY_ORDER[clamp(idx+1)]];
  return [...DAY_ORDER]; // week: all 7 in Mon→Sun order
}

/* Brief one-line descriptor for each cell — full steps are in the modal */
function getCellDesc(day, col) {
  const fixed = {
    'Wakeup':     'Hydrate + protein',
    'AM Oral':    'Brush, scrape & rinse',
    'Body Stack': 'Shower, moisturise & scent',
    'Daytime':    '45-min study block',
    'PM Oral':    'Brush, floss & mouthwash',
    'Wind Down':  'Prayer + sleep',
  };
  if (fixed[col]) return fixed[col];

  const byDay = {
    'AM Face': {
      Monday:'Cleanse, Vit C + SPF',   Tuesday:'Cleanse, Vit C + SPF',
      Wednesday:'Cleanse, shave + SPF', Thursday:'Cleanse, Vit C + SPF',
      Friday:'Cleanse, Vit C + SPF',   Saturday:'Cleanse, Vit C + SPF',
      Sunday:'Cleanse + moisturise + SPF',
    },
    'Training': {
      Monday:'Push workout',           Tuesday:'Pilates guided · 15 min',
      Wednesday:'Rest',                Thursday:'Lower workout',
      Friday:'Pilates gentle · 15 min',Saturday:'Pull workout',
      Sunday:'Pump workout',
    },
    'Training Shower / Afternoon': {
      Monday:'Shave + post-shave recovery', Tuesday:'Body rinse',
      Wednesday:'—',                        Thursday:'Body rinse',
      Friday:'Shave → moisturise · wait 2–3h', Saturday:'Body rinse + face cleanse',
      Sunday:'Body rinse',
    },
    'Evening PM Skincare': {
      Monday:'Double cleanse + copper peptides',
      Tuesday:'Double cleanse + niacinamide + body tan',
      Wednesday:'Double cleanse + salicylic acid',
      Thursday:'Double cleanse + retinol',
      Friday:'Cleanse (if needed) + face tan drops',
      Saturday:'Double cleanse + niacinamide',
      Sunday:'Double cleanse + retinol',
    },
  };
  return (byDay[col] && byDay[col][day]) || '—';
}

function buildCell(day, col) {
  const el = document.createElement('div');
  el.className = 'cell';
  el.innerHTML = `
    <div class="cell-left">
      <div class="cell-label">${col}</div>
      <div class="cell-preview">${getCellDesc(day, col)}</div>
    </div>
    <div class="cell-arrow">›</div>`;
  el.addEventListener('click', () => openModal(day, col));
  return el;
}

function buildCard(day) {
  const isToday = day === todayName();
  const card = document.createElement('div');
  card.className = 'day-card' + (isToday ? ' is-today' : '');
  card.dataset.day = day;

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'card-hdr';

  const top = document.createElement('div');
  top.className = 'card-hdr-top';

  const label = document.createElement('div');
  label.className = 'card-day-label';
  label.textContent = day;

  const chips = document.createElement('div');
  chips.className = 'card-chips';

  const ct = document.createElement('span');
  ct.className = 'chip chip-key';
  ct.textContent = TRAIN_CHIP[day] || '—';
  chips.appendChild(ct);

  const cp = document.createElement('span');
  cp.className = 'chip chip-warm';
  cp.textContent = PM_LABEL[day] || '—';
  chips.appendChild(cp);

  const bf = BODY_CHIP[day];
  if (bf) {
    const cb = document.createElement('span');
    cb.className = 'chip chip-gold';
    cb.textContent = bf;
    chips.appendChild(cb);
  }

  top.appendChild(label);
  top.appendChild(chips);

  const focus = document.createElement('div');
  focus.className = 'card-focus-sub';
  focus.textContent = master[day].Focus;

  hdr.appendChild(top);
  hdr.appendChild(focus);
  card.appendChild(hdr);

  // Cells
  const cellsEl = document.createElement('div');
  cellsEl.className = 'cells';
  COLUMNS.forEach(col => cellsEl.appendChild(buildCell(day, col)));
  card.appendChild(cellsEl);

  return card;
}

function updateDots(activeDayOrIdx) {
  const dots = document.getElementById('carouselDots');
  dots.innerHTML = '';
  // only show dots if more than 1 card
  if (carouselDays.length <= 1) return;
  const activeName = typeof activeDayOrIdx === 'string'
    ? activeDayOrIdx
    : carouselDays[activeDayOrIdx] || '';
  carouselDays.forEach(day => {
    const d = document.createElement('div');
    d.className = 'dot' + (day === activeName ? ' active' : '');
    dots.appendChild(d);
  });
}

function scrollCarouselTo(idx, instant) {
  const c = document.getElementById('carousel');
  c.scrollTo({ left: idx * c.clientWidth, behavior: instant ? 'auto' : 'smooth' });
}

let scrollTimer = null;

function buildCarousel(instant = true) {
  const sel = getSelected();
  carouselDays = calcCarouselDays(mode, sel);

  const c = document.getElementById('carousel');
  // Remove scroll listener temporarily to avoid spurious fires
  c.removeEventListener('scroll', onCarouselScroll);

  c.innerHTML = '';
  carouselDays.forEach(day => c.appendChild(buildCard(day)));

  const selIdx = carouselDays.indexOf(sel);
  const targetIdx = selIdx >= 0 ? selIdx : 0;

  // Use rAF to ensure layout is complete before scrolling
  requestAnimationFrame(() => {
    c.scrollLeft = targetIdx * c.clientWidth;
    updateDots(sel);
    // Re-attach listener after a small delay
    setTimeout(() => c.addEventListener('scroll', onCarouselScroll), 100);
  });
}

function onCarouselScroll() {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    const c = document.getElementById('carousel');
    const cw = c.clientWidth;
    if (!cw || !carouselDays.length) return;
    const idx = Math.round(c.scrollLeft / cw);
    const clamped = Math.max(0, Math.min(idx, carouselDays.length - 1));
    const newDay = carouselDays[clamped];
    updateDots(newDay);
    if (newDay && newDay !== getSelected()) {
      // Update stored selected day silently (no carousel rebuild)
      const d = load();
      d.selectedDay = newDay;
      save(d);
      updateTop(newDay);
      renderChecks(newDay);
    }
  }, 120);
}

/* ── MODE ─────────────────────────────────────────────────── */
function setMode(m) {
  mode = m;
  const d = load();
  d.mode = m;
  save(d);
  document.getElementById('modeDay').classList.toggle('active', m === 'day');
  document.getElementById('mode3').classList.toggle('active',   m === '3');
  document.getElementById('modeWeek').classList.toggle('active',m === 'week');
  buildCarousel(true);
}

/* ── NAVIGATION ───────────────────────────────────────────── */
function navigate(dir) {
  const cur = getSelected();
  const idx = DAY_ORDER.indexOf(cur);
  const newDay = DAY_ORDER[clamp(idx + dir)];

  // Save new selected day
  const d = load();
  d.selectedDay = newDay;
  save(d);
  updateTop(newDay);
  renderChecks(newDay);

  if (mode === 'week') {
    // In week mode: all 7 days are in the carousel already, just scroll
    const newIdx = carouselDays.indexOf(newDay);
    if (newIdx >= 0) scrollCarouselTo(newIdx, false);
    updateDots(newDay);
  } else {
    // Day / 3-day: rebuild centered on new day
    buildCarousel(true);
  }
}

function jumpToday() {
  const day = todayName();
  const d = load();
  d.selectedDay = day;
  save(d);
  updateTop(day);
  renderChecks(day);
  buildCarousel(true);
}

/* ── MODAL ────────────────────────────────────────────────── */
let currentCell = { day: null, col: null };

function defaultHint(col) {
  if (col === 'Training')
    return 'Add your workout here.\n\nExample:\n- Exercise 1: 3–4 sets × 6–12\n- Exercise 2: 3–4 sets × 6–12\n- Exercise 3: 3 sets × 10–15\n- Exercise 4: 3 sets × 10–15\n\nNotes:\n- Rest 2–3 min\n- Close to failure';
  if (col === 'Daytime')
    return 'Define today\'s 45-minute task.\nExample: "Draft 300 words for section X"';
  return 'Optional notes for this cell.';
}

function openModal(day, col) {
  currentCell = { day, col };
  document.getElementById('modalTitle').textContent = `${day} — ${col}`;
  document.getElementById('modalMeta').textContent  = master[day].Focus;

  const stepsList = document.getElementById('modalSteps');
  stepsList.innerHTML = '';
  (master[day].cells[col] || ['—']).forEach(s => {
    const li = document.createElement('li');
    li.textContent = s;
    stepsList.appendChild(li);
  });

  const key = `details_${day}_${col}`;
  document.getElementById('modalDetails').value = load()[key] || defaultHint(col);

  const mb = document.getElementById('modalBack');
  mb.style.display = 'flex';
  mb.setAttribute('aria-hidden', 'false');
}

function closeModal() {
  const mb = document.getElementById('modalBack');
  mb.style.display = 'none';
  mb.setAttribute('aria-hidden', 'true');
  currentCell = { day: null, col: null };
}

/* ── METRICS ──────────────────────────────────────────────── */
function loadWeekly() {
  const d = load();
  document.getElementById('wAvg').value  = d.wAvg  || '';
  document.getElementById('waist').value = d.waist || '';
  document.getElementById('steps').value = d.steps || '';
  document.getElementById('notes').value = d.notes || '';
}

/* ── EVENT LISTENERS ──────────────────────────────────────── */
document.getElementById('prevDay').addEventListener('click', () => navigate(-1));
document.getElementById('nextDay').addEventListener('click', () => navigate(1));
document.getElementById('jumpToday').addEventListener('click', jumpToday);

document.getElementById('modeDay').addEventListener('click',  () => setMode('day'));
document.getElementById('mode3').addEventListener('click',    () => setMode('3'));
document.getElementById('modeWeek').addEventListener('click', () => setMode('week'));

document.getElementById('closeModal').addEventListener('click', closeModal);
document.getElementById('modalBack').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBack')) closeModal();
});
document.getElementById('saveDetails').addEventListener('click', () => {
  if (!currentCell.day) return;
  const d = load();
  d[`details_${currentCell.day}_${currentCell.col}`] = document.getElementById('modalDetails').value;
  save(d);
  closeModal();
});
document.getElementById('clearDetails').addEventListener('click', () => {
  document.getElementById('modalDetails').value = '';
});

document.getElementById('resetDayChecks').addEventListener('click', () => {
  const d = load();
  delete d[`d_${getSelected()}`];
  save(d);
  renderChecks(getSelected());
});
document.getElementById('resetAll').addEventListener('click', () => {
  localStorage.removeItem(KEY);
  location.reload();
});

document.getElementById('saveWeekly').addEventListener('click', () => {
  const d = load();
  d.wAvg  = document.getElementById('wAvg').value;
  d.waist = document.getElementById('waist').value;
  d.steps = document.getElementById('steps').value;
  d.notes = document.getElementById('notes').value;
  save(d);
});
document.getElementById('clearWeekly').addEventListener('click', () => {
  const d = load();
  d.wAvg = ''; d.waist = ''; d.steps = ''; d.notes = '';
  save(d);
  loadWeekly();
});

/* ── INIT ─────────────────────────────────────────────────── */
function init() {
  const d = load();
  mode = d.mode || 'day';
  if (!d.selectedDay) { d.selectedDay = todayName(); save(d); }

  document.getElementById('modeDay').classList.toggle('active',  mode === 'day');
  document.getElementById('mode3').classList.toggle('active',    mode === '3');
  document.getElementById('modeWeek').classList.toggle('active', mode === 'week');

  updateTop(d.selectedDay);
  renderChecks(d.selectedDay);
  buildCarousel(true);
  loadWeekly();
}

init();
</script>
